<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <defs>
    <linearGradient id="gcore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="garch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2a8a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a1a5e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gbase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6a3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e4a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gmod" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a3a1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a2a10;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#44ccff"/>
    </marker>
  </defs>

  <text x="550" y="42" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#44ccff" text-anchor="middle" letter-spacing="2">M.A.T.E.R.I.A. - JERARQUÍA DE MODELOS</text>

  <!-- CORE -->
  <rect x="350" y="65" width="400" height="50" rx="25" fill="#d4a017" stroke="#ffd700" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="88" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#0a0a0a" text-anchor="middle">CORE: Autoentrenamiento Incremental</text>
  <text x="550" y="105" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1a1a1a" text-anchor="middle">Google-Style Self-Training</text>
  <line x1="550" y1="115" x2="550" y2="140" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ARCHITECTURES -->
  <rect x="100" y="150" width="900" height="75" rx="10" fill="#2a1a5e" stroke="#8866dd" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="178" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#ccbbff" text-anchor="middle">ARQUITECTURAS DE MODELADO INTEGRADAS</text>
  <text x="225" y="210" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#ddccff" text-anchor="middle">LLM: Razonamiento textual</text>
  <text x="435" y="210" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#ddccff" text-anchor="middle">SNN: Patrones temporales</text>
  <text x="645" y="210" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#ddccff" text-anchor="middle">SSM: Secuencias largas</text>
  <rect x="760" y="192" width="220" height="25" rx="5" fill="#2a1a5e" stroke="#8866dd" stroke-width="1"/>
  <text x="870" y="210" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#ddccff" text-anchor="middle">JEPA: Espacio latente</text>
  <line x1="550" y1="225" x2="550" y2="255" stroke="#8866dd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- .basemateria -->
  <rect x="100" y="265" width="900" height="110" rx="10" fill="#0e4a2e" stroke="#44ccff" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="298" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#44ff88">MODELOS .basemateria</text>
  <text x="140" y="318" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#88ccaa">BASE DEL SISTEMA - Definen el modelo base</text>

  <text x="217" y="355" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">materia-base</text>
  <text x="392" y="355" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">materia-core</text>
  <text x="567" y="355" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">materia-science</text>
  <text x="742" y="355" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">materia-security</text>
  <text x="910" y="355" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">otros</text>

  <line x1="550" y1="375" x2="550" y2="410" stroke="#44ccff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- .materia -->
  <rect x="100" y="420" width="900" height="110" rx="10" fill="#5a2a10" stroke="#ff8844" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="453" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#ffaa66">MÓDULOS .materia</text>
  <text x="140" y="473" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#ffaa88">CONOCIMIENTO ADICIONAL - Expanden el modelo base</text>

  <text x="217" y="510" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">auto-* (55)</text>
  <text x="392" y="510" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">axum-* (8)</text>
  <text x="567" y="510" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">phantom-* (12)</text>
  <text x="742" y="510" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">mobile-ui</text>
  <text x="910" y="510" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">otros</text>

  <line x1="550" y1="530" x2="550" y2="565" stroke="#ff8844" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GGUF -->
  <rect x="300" y="575" width="500" height="50" rx="25" fill="#0e4a2e" stroke="#44ccff" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="598" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">MODELOS GGUF  (Ollama / llama.cpp)</text>
  <text x="550" y="616" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#88ccaa" text-anchor="middle">Pesos del modelo LLM completo  |  4 - 10 GB cada uno</text>

  <!-- Legend -->
  <rect x="100" y="640" width="900" height="28" rx="5" fill="#0a1520" stroke="#1a2a3a" stroke-width="1"/>
  <text x="132" y="658" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#667788">.basemateria</text>
  <text x="247" y="658" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#667788">.materia</text>
  <text x="347" y="658" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#667788">Arquitecturas</text>
  <text x="462" y="658" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#667788">Core</text>
  <text x="537" y="658" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#667788">GGUF</text>
</svg>
