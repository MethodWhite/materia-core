<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <text x="400" y="25" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3a6e" text-anchor="middle">M.A.T.E.R.I.A. V3 - Componentes de Arquitectura</text>
  <text x="400" y="42" font-family="Arial,sans-serif" font-size="9" fill="#667788" text-anchor="middle">10.363.520 parametros | Python/NumPy | GQA + RoPE + SwiGLU + JEPA + Synapsis + HSAQ</text>
  
  <rect x="35" y="60" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="35" y="60" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="147" y="75" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">GQA - Grouped Query Attention</text>
  <text x="48" y="98" font-family="Arial,sans-serif" font-size="8" fill="#444">8 query / 4 KV heads, dim 64</text>
  <text x="48" y="114" font-family="Arial,sans-serif" font-size="8" fill="#666">KV cache reducido 2x</text>
  <text x="48" y="130" font-family="Arial,sans-serif" font-size="8" fill="#666">Rendimiento similar a 8 heads</text>
  
  <rect x="285" y="60" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="285" y="60" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="397" y="75" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">RoPE - Rotary Position Embed.</text>
  <text x="298" y="98" font-family="Arial,sans-serif" font-size="8" fill="#444">Rotacion de pares de dimensiones</text>
  <text x="298" y="114" font-family="Arial,sans-serif" font-size="8" fill="#666">Distancia relativa entre tokens</text>
  <text x="298" y="130" font-family="Arial,sans-serif" font-size="8" fill="#666">Sin parametros adicionales</text>
  
  <rect x="535" y="60" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="535" y="60" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="647" y="75" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">SwiGLU - Swish-Gated Linear U.</text>
  <text x="548" y="98" font-family="Arial,sans-serif" font-size="8" fill="#444">x * sigmoid(gate) * up</text>
  <text x="548" y="114" font-family="Arial,sans-serif" font-size="8" fill="#666">Activacion adaptativa con puerta</text>
  <text x="548" y="130" font-family="Arial,sans-serif" font-size="8" fill="#666">Mejor convergencia que ReLU</text>
  
  <rect x="35" y="160" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="35" y="160" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="147" y="175" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">JEPA - Joint Embedding Pred.</text>
  <text x="48" y="198" font-family="Arial,sans-serif" font-size="8" fill="#444">Proyeccion 512 a 256 dims</text>
  <text x="48" y="214" font-family="Arial,sans-serif" font-size="8" fill="#666">Prediccion de logits residuales</text>
  <text x="48" y="230" font-family="Arial,sans-serif" font-size="8" fill="#666">Senal auto-supervisada</text>
  
  <rect x="285" y="160" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="285" y="160" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="397" y="175" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">SYNAPSIS - Memoria Persistente</text>
  <text x="298" y="198" font-family="Arial,sans-serif" font-size="8" fill="#444">1024 slots con hash MD5</text>
  <text x="298" y="214" font-family="Arial,sans-serif" font-size="8" fill="#666">Embedding promedio como valor</text>
  <text x="298" y="230" font-family="Arial,sans-serif" font-size="8" fill="#666">Politica FIFO, factor 0.1</text>
  
  <rect x="535" y="160" width="225" height="80" rx="4" fill="#fff" stroke="#1a3a6e" stroke-width="1"/>
  <rect x="535" y="160" width="225" height="22" rx="4" fill="#1a3a6e"/>
  <text x="647" y="175" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">HSAQ - HyperSparse Adapt. Q.</text>
  <text x="548" y="198" font-family="Arial,sans-serif" font-size="8" fill="#444">Umbral de activacion 0.01</text>
  <text x="548" y="214" font-family="Arial,sans-serif" font-size="8" fill="#666">~60% de neuronas omitidas</text>
  <text x="548" y="230" font-family="Arial,sans-serif" font-size="8" fill="#666">Sin perdida de precision</text>
  
  <text x="400" y="290" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Estado: Arquitectura implementada y funcional | Forward pass OK | Checkpoint: 89 MB</text>
  <text x="400" y="305" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">MethodWhite · M.A.T.E.R.I.A. Research · Santiago, Chile · 2026</text>
</svg>