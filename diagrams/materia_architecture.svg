<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/><stop offset="100%" stop-color="#142d55"/>
    </linearGradient>
    <linearGradient id="mods" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a3a1e"/><stop offset="100%" stop-color="#5a2a10"/>
    </linearGradient>
    <linearGradient id="back" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a7e"/><stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
  </defs>

  <text x="400" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3a6e" text-anchor="middle">M.A.T.E.R.I.A. - Arquitectura del Sistema</text>
  <text x="400" y="45" font-family="Arial,sans-serif" font-size="9" fill="#667788" text-anchor="middle">Core: Autoentrenamiento Incremental | LLM + SNN + SSM + JEPA</text>
  
  <!-- CORE -->
  <rect x="250" y="60" width="300" height="40" rx="20" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
  <text x="400" y="78" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0a0a0a" text-anchor="middle">CORE: Autoentrenamiento Incremental</text>
  <text x="400" y="93" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Google-Style Self-Training</text>
  
  <line x1="400" y1="100" x2="400" y2="120" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="396,118 400,125 404,118" fill="#1a3a6e"/>
  
  <!-- ARQUITECTURAS -->
  <rect x="100" y="130" width="600" height="80" rx="5" fill="#e8ecf4" stroke="#1a3a6e" stroke-width="1"/>
  <text x="400" y="150" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1a3a6e" text-anchor="middle">ARQUITECTURAS INTEGRADAS</text>
  
  <rect x="120" y="160" width="130" height="38" rx="4" fill="#1a3a6e"/>
  <text x="185" y="177" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">LLM</text>
  <text x="185" y="191" font-family="Arial,sans-serif" font-size="7" fill="#ddd" text-anchor="middle">Razonamiento textual</text>
  
  <rect x="265" y="160" width="130" height="38" rx="4" fill="#1a3a6e"/>
  <text x="330" y="177" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">SNN</text>
  <text x="330" y="191" font-family="Arial,sans-serif" font-size="7" fill="#ddd" text-anchor="middle">Patrones temporales</text>
  
  <rect x="410" y="160" width="130" height="38" rx="4" fill="#1a3a6e"/>
  <text x="475" y="177" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">SSM</text>
  <text x="475" y="191" font-family="Arial,sans-serif" font-size="7" fill="#ddd" text-anchor="middle">Secuencias largas</text>
  
  <rect x="555" y="160" width="130" height="38" rx="4" fill="#1a3a6e"/>
  <text x="620" y="177" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">JEPA</text>
  <text x="620" y="191" font-family="Arial,sans-serif" font-size="7" fill="#ddd" text-anchor="middle">Espacio latente</text>
  
  <line x1="400" y1="210" x2="400" y2="230" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="396,228 400,235 404,228" fill="#1a3a6e"/>
  
  <!-- .basemateria - fixed to gradient + white text -->
  <rect x="120" y="240" width="560" height="55" rx="5" fill="url(#base)"/>
  <text x="400" y="260" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">MODELOS .basemateria (Base del Sistema)</text>
  <text x="400" y="278" font-family="Arial,sans-serif" font-size="8" fill="#bbccdd" text-anchor="middle">materia-base | materia-core | materia-science | materia-security</text>
  
  <line x1="400" y1="295" x2="400" y2="315" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="396,313 400,320 404,313" fill="#1a3a6e"/>
  
  <!-- .materia - fixed to gradient + white text -->
  <rect x="120" y="325" width="560" height="55" rx="5" fill="url(#mods)"/>
  <text x="400" y="345" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">MODULOS .materia (Conocimiento Adicional)</text>
  <text x="400" y="363" font-family="Arial,sans-serif" font-size="8" fill="#ddbbaa" text-anchor="middle">auto-* | phantom-* | axum-* | mobile-ui | otros</text>
  
  <line x1="400" y1="380" x2="400" y2="400" stroke="#1a3a6e" stroke-width="1"/>
  <polygon points="396,398 400,405 404,398" fill="#1a3a6e"/>
  
  <!-- BACKEND - fixed to gradient + white text -->
  <rect x="250" y="410" width="300" height="35" rx="17" fill="url(#back)"/>
  <text x="400" y="432" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">BACKEND: Ollama / llama.cpp / Cloud API</text>
  
  <text x="400" y="490" font-family="Arial,sans-serif" font-size="8" fill="#aaaaaa" text-anchor="middle">MethodWhite - M.A.T.E.R.I.A. Research - Santiago, Chile - 2026</text>
  <text x="400" y="520" font-family="Arial,sans-serif" font-size="8" fill="#888888" text-anchor="middle">Flujo: Core -> Arquitecturas -> .basemateria -> .materia -> Backend -> Retroalimentacion</text>
</svg>
