# MATERIA V3 - Model Config: 500M params
name: materia-v3-500m
params_m: 500
description: Modelo semigrande con datos reales (C4 + Wikipedia)

model:
  dim: 1024
  n_layers: 20
  n_heads: 16
  n_kv: 4
  synapsis_slots: 512
  hsaq_sparsity: 0.2

tokenizer:
  type: bpe
  vocab_size: 32768
  model_path: data/multilingual/tokenizer/materia_multilingual_v4.model

training:
  lr: 2.0e-4
  weight_decay: 0.1
  epochs: 10
  batch_size: 8
  grad_accum: 16
  seq_len: 1024
  warmup_steps: 2000
  max_lines: 2000000
  val_split: 0.1
  clip_grad_norm: 1.0
  mixed_precision: bf16
  gradient_checkpoint: true
  early_stopping_patience: 3

dataset:
  source: huggingface
  path: allenai/c4
  config: en
  max_lines: 2000000

logging:
  log_interval: 100
  save_interval: 1
  plot_metrics: true
