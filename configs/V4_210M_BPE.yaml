# MATERIA V4 - Config 187M (char-level + HSAQ v2 aprendible por arista)
name: materia-v4-hsaq-v2
params_m: 187
description: V4 187M char-level + HSAQ v2 aprendible por arista, SGD Nesterov

model:
  dim: 896
  n_layers: 10
  n_heads: 8
  n_kv: 4
  latent_dim: 896
  snn_dim: 448
  snn_threshold: 0.001
  snn_tau: 0.8
  ssm_state: 64
  synapsis_slots: 256
  jepa_weight: 2.781042
  use_flash: true
  use_checkpointing: true
  weight_tying: true
  n_cycles: 2
  rope_theta: 10000.0
  rope_scaling_factor: 1.0

tokenizer:
  type: char
  vocab_size: 1024

training:
  lr: 2.0e-4
  weight_decay: 0.000001     # Casi sin weight_decay para evitar colapso latente
  epochs: 10
  batch_size: 1
  grad_accum: 1
  seq_len: 128
  warmup_steps: 1000
  max_lines: 200000
  val_split: 0.1
  clip_grad_norm: 0.5        # Clipping más agresivo contra NaN
  mixed_precision: bf16
  num_workers: 0
  early_stopping_patience: 5
  label_smoothing: 0.1
  batch_save_interval: 10000
  spike_target: 0.30          # Tasa de spike objetivo para SNN
  spike_weight: 1.0            # Regularizador más suave para estabilidad

dataset:
  source: local
  path: data/multilingual/tokenizer
  files:
    - c4_en.txt
    - combined_for_spm.txt
    - wiki_en.txt
    - wiki_es.txt
    - wiki_fr.txt
    - wiki_de.txt

logging:
  log_interval: 50
  save_interval: 1
  batch_save_interval: 25000
  gen_interval: 500
  plot_metrics: true
