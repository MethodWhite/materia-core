# MATERIA V4 Medium - Escalado gradual
name: materia-v4-medium
params_m: 7.0
description: V4 Medium - dim=320, 4 layers, early stopping para no sobreentrenar

model:
  dim: 320
  n_layers: 4
  n_heads: 8
  n_kv: 4
  latent_dim: 320
  snn_dim: 160
  snn_threshold: 0.005
  snn_tau: 0.8
  ssm_state: 32
  synapsis_slots: 128
  hsaq_sparsity: 0.3
  jepa_weight: 2.781042

tokenizer:
  type: char
  vocab_size: 1024

training:
  lr: 5.0e-4
  weight_decay: 0.01
  epochs: 5
  batch_size: 4
  grad_accum: 4
  seq_len: 64
  warmup_steps: 100
  max_lines: 10000
  val_split: 0.1
  clip_grad_norm: 1.0
  mixed_precision: bf16
  num_workers: 0
  early_stopping_patience: 2

dataset:
  source: local
  path: data/multilingual/tokenizer
  files:
    - c4_en.txt
    - wiki_en.txt
    - wiki_es.txt

logging:
  log_interval: 25
  save_interval: 1
  plot_metrics: true
